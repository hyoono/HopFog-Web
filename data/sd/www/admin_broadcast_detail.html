<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HopFog - Broadcast Detail</title>
    <link rel="icon" type="image/png" href="/static/images/HopFog-Logo.png">
    <link href="/static/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <a class="navbar-brand ps-3" href="/dashboard">HopFog</a>
        <form class="d-none d-md-inline-block form-inline ms-auto me-md-3 my-2">
        <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="fas fa-user fa-fw"></i></a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/settings">Settings</a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li><a class="dropdown-item" href="/">Logout</a></li>
                </ul>
            </li>
        </ul>
        </form>
    </nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Core</div>
                        <a class="nav-link" href="/dashboard"><div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>Dashboard</a>
                        <div class="sb-sidenav-menu-heading">Admin</div>
                        <a class="nav-link" href="/admin/messaging"><div class="sb-nav-link-icon"><i class="fas fa-bullhorn"></i></div>Admin Messaging</a>
                        <a class="nav-link" href="/admin/broadcasts"><div class="sb-nav-link-icon"><i class="fas fa-paper-plane"></i></div>Broadcasts</a>
                    </div>
                </div>
                <div class="sb-sidenav-footer"><div class="small">Logged in as:</div><span id="sidebarUsername">Admin</span></div>
            </nav>
        </div>
        <div id="layoutSidenav_content">
            <main class="p-4">
                <h1 class="mt-4">Broadcast Detail</h1>
                <ol class="breadcrumb mb-4">
                    <li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li>
                    <li class="breadcrumb-item"><a href="/admin/broadcasts">Broadcasts</a></li>
                    <li class="breadcrumb-item active" id="breadcrumbId">Detail</li>
                </ol>
                <div class="card mb-4">
                    <div class="card-header"><i class="fas fa-info-circle me-1"></i>Broadcast Information</div>
                    <div class="card-body" id="detailContent">
                        <p class="text-muted">Loading…</p>
                    </div>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto"><div class="container-fluid px-4"><div class="text-muted small">Copyright &copy; HopFog 2026</div></div></footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/scripts.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const broadcastId = params.get('id');
        if (broadcastId) {
            document.getElementById('breadcrumbId').textContent = '#' + broadcastId;
            fetch('/api/broadcasts').then(r=>{if(r.status===401){window.location.href='/';return null;}return r.json();}).then(data=>{
                if (!data) return;
                const bc = data.find(b => b.id == broadcastId);
                if (!bc) { document.getElementById('detailContent').innerHTML='<p class="text-danger">Broadcast not found.</p>'; return; }
                const typeClass = bc.msg_type==='sos'?'bg-danger':bc.msg_type==='alert'?'bg-warning':'bg-info';
                const statusClass = bc.status==='sent'?'bg-success':bc.status==='queued'?'bg-warning':'bg-secondary';
                document.getElementById('detailContent').innerHTML =
                    '<div class="row"><div class="col-md-6">' +
                    '<p><strong>ID:</strong> '+bc.id+'</p>' +
                    '<p><strong>Type:</strong> <span class="badge '+typeClass+'">'+bc.msg_type+'</span></p>' +
                    '<p><strong>Severity:</strong> '+bc.severity+'</p>' +
                    '<p><strong>Audience:</strong> '+bc.audience+'</p>' +
                    '</div><div class="col-md-6">' +
                    '<p><strong>Status:</strong> <span class="badge '+statusClass+'">'+bc.status+'</span></p>' +
                    '<p><strong>Priority:</strong> '+bc.priority+'</p>' +
                    '<p><strong>Created:</strong> '+bc.created_at+'</p>' +
                    '</div></div>' +
                    '<hr><p><strong>Subject:</strong> '+bc.subject+'</p>' +
                    '<p><strong>Body:</strong> '+bc.body+'</p>';
            });
        } else {
            document.getElementById('detailContent').innerHTML = '<p class="text-danger">No broadcast ID specified.</p>';
        }
    </script>
</body>
</html>
