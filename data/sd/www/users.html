<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HopFog - Users</title>
    <link rel="icon" type="image/png" href="/static/images/HopFog-Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="/static/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <a class="navbar-brand ps-3" href="/dashboard">HopFog</a>
        <form class="d-none d-md-inline-block form-inline ms-auto me-md-3 my-2">
        <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="fas fa-user fa-fw"></i></a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/settings">Settings</a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li><a class="dropdown-item" href="/">Logout</a></li>
                </ul>
            </li>
        </ul>
        </form>
    </nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Core</div>
                        <a class="nav-link" href="/dashboard"><div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>Dashboard</a>
                        <a class="nav-link" href="/logs"><div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>Logs</a>
                        <a class="nav-link active" href="/users"><div class="sb-nav-link-icon"><i class="fas fa-columns"></i></div>Users</a>
                        <a class="nav-link" href="/fog_nodes"><div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>Fog Nodes</a>
                        <div class="sb-sidenav-menu-heading">Admin</div>
                        <a class="nav-link" href="/admin/messaging"><div class="sb-nav-link-icon"><i class="fas fa-bullhorn"></i></div>Admin Messaging</a>
                        <a class="nav-link" href="/admin/broadcasts"><div class="sb-nav-link-icon"><i class="fas fa-paper-plane"></i></div>Broadcasts</a>
                        <a class="nav-link" href="/admin/sos"><div class="sb-nav-link-icon"><i class="fas fa-triangle-exclamation"></i></div>SOS Console</a>
                    </div>
                </div>
                <div class="sb-sidenav-footer"><div class="small">Logged in as:</div><span id="sidebarUsername">Admin</span></div>
            </nav>
        </div>
        <div id="layoutSidenav_content">
            <main class="p-4">
                <h1 class="mt-4">User Management</h1>
                <ol class="breadcrumb mb-4"><li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li><li class="breadcrumb-item active">Users</li></ol>

                <!-- Create Mobile User -->
                <div class="card mb-4">
                    <div class="card-header"><i class="fas fa-user-plus me-1"></i>Create Mobile User</div>
                    <div class="card-body">
                        <div id="createUserMsg" style="display:none;"></div>
                        <form id="createUserForm" class="row g-3">
                            <div class="col-md-3"><input type="text" class="form-control" name="username" placeholder="Username" required></div>
                            <div class="col-md-3"><input type="email" class="form-control" name="email" placeholder="Email" required></div>
                            <div class="col-md-3"><input type="password" class="form-control" name="password" placeholder="Password" required minlength="6"></div>
                            <div class="col-md-3"><button type="submit" class="btn btn-primary w-100"><i class="fas fa-plus me-1"></i>Create</button></div>
                        </form>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="card mb-4">
                    <div class="card-header"><i class="fas fa-users me-1"></i>All Users</div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
                            <tbody id="usersBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto"><div class="container-fluid px-4"><div class="text-muted small">Copyright &copy; HopFog 2026</div></div></footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/scripts.js"></script>
    <script>
        function loadUsers() {
            fetch('/api/users').then(r => { if(r.status===401){window.location.href='/';return null;} return r.json(); }).then(users => {
                if (!users) return;
                const tbody = document.getElementById('usersBody');
                tbody.innerHTML = '';
                users.forEach(u => {
                    const active = u.is_active ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-danger">Inactive</span>';
                    const btn = u.role !== 'admin' ? '<button class="btn btn-sm btn-outline-warning" onclick="toggleStatus('+u.id+')"><i class="fas fa-toggle-on"></i></button>' : '';
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td>'+u.id+'</td><td>'+u.username+'</td><td>'+u.email+'</td><td><span class="badge bg-info">'+u.role+'</span></td><td>'+active+'</td><td>'+btn+'</td>';
                    tbody.appendChild(tr);
                });
            });
        }
        loadUsers();

        document.getElementById('createUserForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fd = new FormData(this);
            const msgDiv = document.getElementById('createUserMsg');
            fetch('/api/admin/create-mobile-user', {method:'POST', body:fd}).then(r=>r.json()).then(data => {
                if (data.error) { msgDiv.className='alert alert-danger'; msgDiv.textContent=data.error; }
                else { msgDiv.className='alert alert-success'; msgDiv.textContent=data.message; this.reset(); loadUsers(); }
                msgDiv.style.display='block';
            });
        });

        function toggleStatus(userId) {
            fetch('/api/users/'+userId+'/toggle-status', {method:'PUT'}).then(r=>r.json()).then(() => loadUsers());
        }
    </script>
</body>
</html>
