<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HopFog - Message Logs</title>
    <link rel="icon" type="image/png" href="/static/images/HopFog-Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="/static/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <a class="navbar-brand ps-3" href="/dashboard">HopFog</a>
        <form class="d-none d-md-inline-block form-inline ms-auto me-md-3 my-2">
        <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="fas fa-user fa-fw"></i></a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/settings">Settings</a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li><a class="dropdown-item" href="/">Logout</a></li>
                </ul>
            </li>
        </ul>
        </form>
    </nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Core</div>
                        <a class="nav-link" href="/dashboard"><div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>Dashboard</a>
                        <a class="nav-link active" href="/logs"><div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>Logs</a>
                        <a class="nav-link" href="/users"><div class="sb-nav-link-icon"><i class="fas fa-columns"></i></div>Users</a>
                        <a class="nav-link" href="/fog_nodes"><div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>Fog Nodes</a>
                        <div class="sb-sidenav-menu-heading">Admin</div>
                        <a class="nav-link" href="/admin/messaging"><div class="sb-nav-link-icon"><i class="fas fa-bullhorn"></i></div>Admin Messaging</a>
                        <a class="nav-link" href="/admin/broadcasts"><div class="sb-nav-link-icon"><i class="fas fa-paper-plane"></i></div>Broadcasts</a>
                        <a class="nav-link" href="/admin/sos"><div class="sb-nav-link-icon"><i class="fas fa-triangle-exclamation"></i></div>SOS Console</a>
                    </div>
                </div>
                <div class="sb-sidenav-footer"><div class="small">Logged in as:</div><span id="sidebarUsername">Admin</span></div>
            </nav>
        </div>
        <div id="layoutSidenav_content">
            <main class="p-4">
                <h1 class="mt-4">Message Logs</h1>
                <ol class="breadcrumb mb-4"><li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li><li class="breadcrumb-item active">Logs</li></ol>
                <div class="card mb-4">
                    <div class="card-header"><i class="fas fa-table me-1"></i>All Messages</div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead><tr><th>ID</th><th>From</th><th>To</th><th>Message</th><th>Date</th><th>Actions</th></tr></thead>
                            <tbody id="messagesBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto"><div class="container-fluid px-4"><div class="text-muted small">Copyright &copy; HopFog 2026</div></div></footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/scripts.js"></script>
    <script>
        function loadMessages() {
            fetch('/api/messages').then(r => { if(r.status===401){window.location.href='/';return null;} return r.json(); }).then(messages => {
                if (!messages) return;
                const tbody = document.getElementById('messagesBody');
                tbody.innerHTML = '';
                messages.forEach(m => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td>'+m.id+'</td><td>'+m.from+'</td><td>'+(m.to||[]).join(', ')+'</td><td>'+m.body+'</td><td>'+m.created_at+'</td>'
                        + '<td><button class="btn btn-sm btn-outline-danger" onclick="deleteMsg('+m.id+')"><i class="fas fa-trash"></i></button></td>';
                    tbody.appendChild(tr);
                });
            });
        }
        loadMessages();

        function deleteMsg(id) {
            if (!confirm('Delete this message?')) return;
            fetch('/api/messages/'+id, {method:'DELETE'}).then(r=>r.json()).then(() => loadMessages());
        }
    </script>
</body>
</html>
