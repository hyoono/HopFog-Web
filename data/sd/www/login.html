<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HopFog - Login</title>
    <link rel="icon" type="image/png" href="/static/images/HopFog-Logo.png">
    <link href="/static/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
    <div id="layoutAuthentication">
        <div id="layoutAuthentication_content">
            <main>
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-10 col-xl-9">
                            <div class="card shadow-lg border-0 rounded-lg mt-5 notebook-card">
                                <div class="row g-0">
                                    <div class="col-md-6 notebook-left">
                                        <h3 class="text-center font-weight-light mb-5">
                                            <i class="fas fa-sign-in-alt me-2"></i>Admin Login
                                        </h3>
                                        <div id="errorBox" style="background-color:#f8d7da;color:#721c24;padding:10px 15px;border-radius:5px;margin-bottom:15px;border:1px solid #f5c6cb;text-align:center;display:none;"></div>
                                        <div id="successBox" style="background-color:#d4edda;color:#155724;padding:10px 15px;border-radius:5px;margin-bottom:15px;border:1px solid #c3e6cb;text-align:center;display:none;"></div>
                                        <form method="POST" action="/login">
                                            <div class="form-floating mb-4">
                                                <input class="form-control" id="inputEmail" type="email" name="email" placeholder="name@example.com" required />
                                                <label for="inputEmail">Email</label>
                                            </div>
                                            <div class="form-floating mb-4">
                                                <input class="form-control" id="inputPassword" type="password" name="password" placeholder="Password" required />
                                                <label for="inputPassword">Password</label>
                                            </div>
                                            <div class="d-flex align-items-center justify-content-between mt-4 mb-3">
                                                <a class="small" href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
                                                <button class="btn btn-primary px-4" type="submit">Login</button>
                                            </div>
                                        </form>
                                        <hr class="my-4">
                                        <div class="text-center">
                                            <div class="small"><a href="/register">Need an account? Sign up!</a></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6 notebook-right">
                                        <img src="/static/images/HopFog-Logo.png" alt="HopFog Logo" class="notebook-logo">
                                        <h4 class="fw-bold mb-2">HopFog App</h4>
                                        <p class="notebook-right-desc">Download the HopFog mobile app and stay connected on the go.</p>
                                        <a href="#" class="btn btn-download"><i class="fas fa-download me-2"></i>Download APK</a>
                                        <p class="notebook-right-info"><i class="fas fa-info-circle me-1"></i>Requires Android 8.0+</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <div id="layoutAuthentication_footer">
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; HopFog 2026</div>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-key me-2"></i>Forgot Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="forgotPasswordForm">
                    <div class="modal-body">
                        <div id="forgotPasswordMessage" style="display:none;"></div>
                        <div class="mb-3">
                            <label for="resetEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="resetEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="newPassword" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="resetPasswordBtn"><i class="fas fa-save me-2"></i>Reset Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            const box = document.getElementById('errorBox');
            const msgs = {invalid:'Invalid email or password', not_admin:'Not authorized for web access', inactive:'Account is inactive', missing_fields:'Please fill in all fields'};
            box.textContent = msgs[params.get('error')] || 'Login failed';
            box.style.display = 'block';
        }
        if (params.get('registered')) {
            const box = document.getElementById('successBox');
            box.textContent = 'Registration successful! Please log in.';
            box.style.display = 'block';
        }
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;
            const msgDiv = document.getElementById('forgotPasswordMessage');
            const btn = document.getElementById('resetPasswordBtn');
            if (newPw !== confirmPw) {
                msgDiv.className = 'alert alert-danger'; msgDiv.textContent = 'Passwords do not match!'; msgDiv.style.display = 'block'; return;
            }
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Processing...';
            const fd = new FormData(); fd.append('email', email); fd.append('new_password', newPw);
            fetch('/forgot-password', {method:'POST', body:fd}).then(r=>r.json()).then(data => {
                msgDiv.className = data.success ? 'alert alert-success' : 'alert alert-danger';
                msgDiv.textContent = data.message; msgDiv.style.display = 'block';
                if (data.success) { document.getElementById('forgotPasswordForm').reset(); setTimeout(()=>{bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal')).hide();},2000); }
            }).catch(()=>{msgDiv.className='alert alert-danger';msgDiv.textContent='An error occurred.';msgDiv.style.display='block';})
            .finally(()=>{btn.disabled=false;btn.innerHTML='<i class="fas fa-save me-2"></i>Reset Password';});
        });
    </script>
</body>
</html>
