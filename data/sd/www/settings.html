<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Settings</title>
    <link rel="icon" type="image/png" href="/static/images/HopFog-Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="/static/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <a class="navbar-brand ps-3" href="/dashboard">HopFog</a>
        <form class="d-none d-md-inline-block form-inline ms-auto me-md-3 my-2">
        <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" data-bs-toggle="dropdown"><i class="fas fa-user fa-fw"></i></a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/settings">Settings</a></li>
                    <li><a class="dropdown-item" href="#">Activity Log</a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li><a class="dropdown-item" href="/">Logout</a></li>
                </ul>
            </li>
        </ul>
        </form>
    </nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Core</div>
                        <a class="nav-link" href="/dashboard"><div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>Dashboard</a>
                        <a class="nav-link" href="/logs"><div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>Logs</a>
                        <a class="nav-link" href="/users"><div class="sb-nav-link-icon"><i class="fas fa-columns"></i></div>Users</a>
                        <a class="nav-link" href="/fog_nodes"><div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>Fog Nodes &amp; Network</a>
                        <div class="sb-sidenav-menu-heading">Admin</div>
                        <a class="nav-link" href="/admin/messaging"><div class="sb-nav-link-icon"><i class="fas fa-bullhorn"></i></div>Admin Messaging</a>
                        <a class="nav-link" href="/admin/messaging/broadcasts"><div class="sb-nav-link-icon"><i class="fas fa-paper-plane"></i></div>Broadcasts</a>
                        <a class="nav-link" href="/admin/messaging/queue"><div class="sb-nav-link-icon"><i class="fas fa-layer-group"></i></div>Queue Monitor</a>
                        <a class="nav-link" href="/admin/messaging/tracking"><div class="sb-nav-link-icon"><i class="fas fa-chart-line"></i></div>Delivery Tracking</a>
                        <a class="nav-link" href="/admin/messaging/sos"><div class="sb-nav-link-icon"><i class="fas fa-triangle-exclamation"></i></div>SOS Console</a>
                        <a class="nav-link" href="/admin/messaging/testing"><div class="sb-nav-link-icon"><i class="fas fa-vial"></i></div>Testing</a>
                    </div>
                </div>
                <div class="sb-sidenav-footer">
                    <div class="small">Logged in as:</div>
                    <span id="sidebarUsername">HopFog User</span>
                </div>
            </nav>
        </div>
        <div id="layoutSidenav_content">
            <main class="p-4">
                <div class="container-fluid px-4">
                    <h1 class="mt-4" style="font-style: italic; color: #333;">Settings</h1>
                    <div id="settingsAlert" style="display:none;" role="alert"></div>
                    <div class="card mb-4">
                        <div class="card-header" style="background-color: #fff; border-bottom: 2px solid #007bff;">
                            <span style="color: #007bff; font-weight: 500;">Personal Info</span>
                        </div>
                        <div class="card-body">
                            <div class="mb-4">
                                <label class="form-label text-muted small">Name</label>
                                <div class="d-flex align-items-center">
                                    <input type="text" class="form-control bg-light border-0" id="settingsName" value="" readonly disabled style="max-width: 300px;">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">Email</label>
                                <div class="d-flex align-items-center">
                                    <input type="email" class="form-control bg-light border-0" id="settingsEmail" value="" readonly disabled style="max-width: 300px;">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">Status history</label>
                                <div class="d-flex align-items-center">
                                    <span class="form-control bg-light border-0" id="settingsDate" style="max-width: 200px; display: inline-block;">N/A</span>
                                    <span class="ms-3" id="settingsStatus"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card mb-4">
                        <div class="card-header" style="background-color: #fff; border-bottom: 2px solid #007bff;">
                            <span style="color: #007bff; font-weight: 500;">Change Password</span>
                        </div>
                        <div class="card-body">
                            <form id="passwordForm">
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Current Password</label>
                                    <input type="password" class="form-control" id="current_password" name="current_password" required style="max-width: 300px;">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">New Password</label>
                                    <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6" style="max-width: 300px;">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6" style="max-width: 300px;">
                                </div>
                                <div class="mt-4">
                                    <button type="submit" class="btn btn-primary px-4">Change Password</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; HopFog 2026</div>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/scripts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/dashboard').then(function(r){return r.json();}).then(function(data) {
                if (data.current_user) {
                    var u = data.current_user;
                    document.getElementById('settingsName').value = u.username || '';
                    document.getElementById('settingsEmail').value = u.email || '';
                    document.getElementById('sidebarUsername').textContent = u.username || 'HopFog User';
                    if (u.created_at) {
                        var d = new Date(u.created_at);
                        document.getElementById('settingsDate').textContent = (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();
                    }
                    if (u.is_active) document.getElementById('settingsStatus').innerHTML = '<span class="text-success"><i class="fas fa-check-circle"></i> Activated</span>';
                    else document.getElementById('settingsStatus').innerHTML = '<span class="text-secondary"><i class="fas fa-times-circle"></i> Inactive</span>';
                }
            });
            document.getElementById('passwordForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var np = document.getElementById('new_password').value;
                var cp = document.getElementById('confirm_password').value;
                if (np !== cp) { alert('New passwords do not match!'); return; }
                var fd = new FormData();
                fd.append('current_password', document.getElementById('current_password').value);
                fd.append('new_password', np);
                fd.append('confirm_password', cp);
                fetch('/api/change-password', {method:'POST',body:fd}).then(function(r){return r.json();}).then(function(data) {
                    var el = document.getElementById('settingsAlert');
                    if (data.success) { el.className='alert alert-success alert-dismissible fade show'; el.innerHTML=data.message+'<button type="button" class="btn-close" data-bs-dismiss="alert"></button>'; }
                    else { el.className='alert alert-danger alert-dismissible fade show'; el.innerHTML=(data.message||data.detail||'Error')+'<button type="button" class="btn-close" data-bs-dismiss="alert"></button>'; }
                    el.style.display='block';
                    document.getElementById('passwordForm').reset();
                }).catch(function(){alert('An error occurred. Please try again.');});
            });
        });
    </script>
</body>
</html>
