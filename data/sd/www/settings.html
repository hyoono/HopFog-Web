<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HopFog - Settings</title>
    <link rel="icon" type="image/png" href="/static/images/HopFog-Logo.png">
    <link href="/static/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <a class="navbar-brand ps-3" href="/dashboard">HopFog</a>
        <form class="d-none d-md-inline-block form-inline ms-auto me-md-3 my-2">
        <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="fas fa-user fa-fw"></i></a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/settings">Settings</a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li><a class="dropdown-item" href="/">Logout</a></li>
                </ul>
            </li>
        </ul>
        </form>
    </nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Core</div>
                        <a class="nav-link" href="/dashboard"><div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>Dashboard</a>
                        <a class="nav-link" href="/logs"><div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>Logs</a>
                        <a class="nav-link" href="/users"><div class="sb-nav-link-icon"><i class="fas fa-columns"></i></div>Users</a>
                        <a class="nav-link" href="/fog_nodes"><div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>Fog Nodes</a>
                    </div>
                </div>
                <div class="sb-sidenav-footer"><div class="small">Logged in as:</div><span id="sidebarUsername">Admin</span></div>
            </nav>
        </div>
        <div id="layoutSidenav_content">
            <main class="p-4">
                <h1 class="mt-4">Account Settings</h1>
                <ol class="breadcrumb mb-4"><li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li><li class="breadcrumb-item active">Settings</li></ol>
                <div class="card mb-4">
                    <div class="card-header"><i class="fas fa-key me-1"></i>Change Password</div>
                    <div class="card-body">
                        <div id="pwMsg" style="display:none;"></div>
                        <form id="changePwForm">
                            <div class="mb-3">
                                <label class="form-label">Current Password</label>
                                <input type="password" class="form-control" name="current_password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" class="form-control" name="new_password" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm New Password</label>
                                <input type="password" class="form-control" name="confirm_password" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Change Password</button>
                        </form>
                    </div>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto"><div class="container-fluid px-4"><div class="text-muted small">Copyright &copy; HopFog 2026</div></div></footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/scripts.js"></script>
    <script>
        document.getElementById('changePwForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fd = new FormData(this);
            const msgDiv = document.getElementById('pwMsg');
            fetch('/api/change-password', {method:'POST', body:fd}).then(r=>r.json()).then(data => {
                if (data.success) { msgDiv.className='alert alert-success'; msgDiv.textContent=data.message; this.reset(); }
                else { msgDiv.className='alert alert-danger'; msgDiv.textContent=data.error||data.message; }
                msgDiv.style.display='block';
            }).catch(()=>{msgDiv.className='alert alert-danger';msgDiv.textContent='An error occurred';msgDiv.style.display='block';});
        });
    </script>
</body>
</html>
