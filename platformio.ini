; PlatformIO configuration for HopFog-Web ESP32
; https://docs.platformio.org/page/projectconf.html
;
; Build the default env:     pio run
; Build for ESP32-CAM:       pio run -e esp32cam
; Flash ESP32-CAM:           pio run -e esp32cam --target upload

; ── Shared settings ──────────────────────────────────────────────────
[common]
framework = arduino
monitor_speed = 115200
lib_deps =
    me-no-dev/ESPAsyncWebServer@^1.2.4
    me-no-dev/AsyncTCP@^1.1.1
    bblanchon/ArduinoJson@^7.3.0
board_build.partitions = min_spiffs.csv

; ── Generic ESP32 dev board (SPI SD card module) ─────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
board_build.partitions = ${common.board_build.partitions}
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -DASYNCWEBSERVER_REGEX

; ── AI-Thinker ESP32-CAM (built-in SD card slot, no camera used) ─────
; IMPORTANT: CORE_DEBUG_LEVEL must be 0 because UART0 is shared with XBee.
; Level 1+ enables ESP-IDF log output (WiFi, SPI, AsyncTCP) on UART0,
; which corrupts XBee API frames and prevents all communication.
[env:esp32cam]
platform = espressif32
board = esp32cam
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
board_build.partitions = ${common.board_build.partitions}
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=1
    -DESP32CAM_SPI_SD=1
    -DASYNCWEBSERVER_REGEX
