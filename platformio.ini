; PlatformIO configuration for HopFog-Web — ESP32-CAM ONLY
; https://docs.platformio.org/page/projectconf.html
;
; Build:    pio run
; Flash:    pio run --target upload
; Monitor:  Not available (UART0 = XBee)
;
; IMPORTANT: UART0 (GPIO 1/3) is used for XBee communication.
; USB Serial Monitor is NOT available.  Use the web dashboard instead.
; Disconnect XBee before flashing new firmware.

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
lib_deps =
    me-no-dev/ESPAsyncWebServer@^1.2.4
    me-no-dev/AsyncTCP@^1.1.1
    bblanchon/ArduinoJson@^7.3.0
    adafruit/Adafruit INA219@^1.2.1
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=1
    -DASYNCWEBSERVER_REGEX=1
